<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Dodo Audio</title>

    <!-- PWA -->
    <link rel="manifest" href="/DodoAudio/manifest.json" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dodo Audio" />
    <link rel="apple-touch-icon" href="/DodoAudio/assets/icon.png" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  <link rel="icon" href="/DodoAudio/favicon.ico" /></head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root">
      <div id="boot-fallback" style="color:#fff;background:#0A0A0A;padding:32px;font-family:system-ui,sans-serif;height:100vh;box-sizing:border-box">
        <h2 style="color:#3B82F6">Dodo Audio</h2>
        <p>Chargement en cours...</p>
        <p style="color:#9CA3AF;font-size:13px">Si ce message reste, React n'a pas pu monter l'application.</p>
        <div id="boot-status" style="color:#f87171;font-family:monospace;font-size:12px;white-space:pre-wrap;margin-top:16px"></div>
      </div>
    </div>
    <script>
      // Vérifie si React a remplacé le fallback après 5 secondes
      setTimeout(function() {
        var fb = document.getElementById('boot-fallback');
        if (fb) {
          var s = document.getElementById('boot-status');
          if (s) {
            s.textContent = 'REACT N\'A PAS MONTÉ après 5s. Le bundle JS s\'exécute mais ne rend rien.\n\nVérifie l\'onglet Console pour des warnings/errors et l\'onglet Network pour des 404.';
          }
        }
      }, 5000);
    </script>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML =
        '<div style="color:#f87171;background:#1a1a2e;padding:24px;font-family:monospace;white-space:pre-wrap">' +
        '<b>ERREUR JS :</b>\n' + msg + '\n\nSource: ' + src + '\nLigne: ' + line +
        (err && err.stack ? '\n\nStack:\n' + err.stack : '') + '</div>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('root').innerHTML =
        '<div style="color:#f87171;background:#1a1a2e;padding:24px;font-family:monospace;white-space:pre-wrap">' +
        '<b>PROMISE REJETÉE :</b>\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</div>';
    });
  </script>
  <script src="/DodoAudio/_expo/static/js/web/entry-1cd7d3dbb266b85f2b16f07e6794f1f1.js" defer></script>
  <script>
    // Temporarily unregister any existing service worker (debug mode)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.unregister(); });
      });
      if (window.caches) {
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
      }
    }
  </script>
</body>
</html>
